<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMAKWEBO - Online Marketplace</title>
  <style>
    /* Base Reset & Variables */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --primary-color: #2c3e50;
      --accent-color: #27ae60;
      --whatsapp-color: #25D366;
      --call-color: #27ae60; /* Changed to green as requested */
      --light-bg: #f8f9fa;
      --dark-text: #333;
    }

    body {
      background-color: var(--light-bg);
      color: var(--dark-text);
      line-height: 1.6;
    }

    /* Header & Navigation */
    header {
      background-color: var(--primary-color);
      color: white;
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .contact-top {
      font-size: 0.9rem;
    }

    .contact-top a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    /* Image Slider Carousel */
    .slider-container {
      max-width: 1200px;
      margin: 2rem auto;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .slider {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }

    .slide {
      min-width: 100%;
      position: relative;
    }

    .slide img {
      width: 100%;
      height: 450px;
      object-fit: cover;
      display: block;
    }

    .slide-text {
      position: absolute;
      bottom: 20%;
      left: 5%;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 1rem 2rem;
      border-radius: 5px;
    }

    /* Slider Buttons */
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      padding: 1rem;
      cursor: pointer;
      font-size: 1.5rem;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .prev {
      left: 10px;
    }

    .next {
      right: 10px;
    }

    /* Main Marketplace Section */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 3rem 1rem;
    }

    .section-title {
      text-align: center;
      margin: 2rem 0;
      font-size: 2rem;
      color: var(--primary-color);
      position: relative;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 80px;
      height: 4px;
      background: var(--accent-color);
      margin: 8px auto 0 auto;
      border-radius: 2px;
    }

    /* Responsive Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .product-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
    }

    .product-image {
      width: 100%;
      height: 280px;
      object-fit: cover;
      background-color: #eaeaea;
    }

    .product-info {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .product-title {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: var(--primary-color);
    }

    .product-price {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent-color);
      margin-bottom: 1rem;
    }

    /* Action Buttons */
    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: auto;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .btn-buy {
      background-color: var(--accent-color);
      color: white;
      flex: 1;
    }

    .btn-buy:hover {
      background-color: #219653;
    }

    .btn-details {
      background-color: #e0e0e0;
      color: var(--dark-text);
      flex: 1;
    }

    .btn-details:hover {
      background-color: #d5d5d5;
    }

    .btn-whatsapp {
      background-color: var(--whatsapp-color);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
    }

    .btn-whatsapp:hover {
      background-color: #1ebe57;
    }

    /* Modal Popups for Details */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      max-width: 500px;
      width: 100%;
      position: relative;
      animation: fadeIn 0.3s ease;
    }

    .close-modal {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 1.5rem;
      cursor: pointer;
      color: #999;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Floating Action Buttons Container */
    .floating-container {
      position: fixed;
      bottom: 25px;
      right: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 3000;
    }

    .floating-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .floating-btn:hover {
      transform: scale(1.1);
    }

    .float-wa {
      background-color: var(--whatsapp-color);
    }

    .float-wa:hover {
      background-color: #1ebe57;
    }

    .float-call {
      background-color: var(--call-color); /* Updated to Green */
    }

    .float-call:hover {
      background-color: #219653;
    }

    /* Responsive Design Breakpoints */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        gap: 0.5rem;
        text-align: center;
      }

      .slide img {
        height: 300px;
      }

      .slide-text h2 {
        font-size: 1.2rem;
      }

      .floating-container {
        bottom: 15px;
        right: 15px;
        gap: 10px;
      }
      
      .floating-btn {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>

    });

    // --- Action Handlers ---
    function triggerBuy(name, price) {
      alert(`Thank you for choosing Kwatu Amakwebo!\n\nTo complete your purchase for: "${name}" (${price}), please proceed to send us a direct message on WhatsApp or Call via +260974101130.`);
    }

    function openDetails(index) {
      const prod = products[index];
      document.getElementById('modalTitle').innerText = prod.name;
      document.getElementById('modalDescription').innerText = prod.desc;
      document.getElementById('modalPrice').innerText = `Price: ${prod.price}`;
      document.getElementById('detailsModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('detailsModal').style.display = 'none';
    }
    
    // Close modal if user clicks outside of the window
    window.onclick = function(event) {
      const modal = document.getElementById('detailsModal');
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }
  </script>
</body>
